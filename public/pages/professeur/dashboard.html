<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Espace Professeur</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="../../css/base.css" />
  <link rel="stylesheet" href="../../css/dashboard_prof.css" />
  
  <script src="https://sdk.twilio.com/js/video/releases/2.30.0/twilio-video.min.js"></script>
</head>

<body class="role-professeur">
  
  <header class="top-bar">

    <!-- ✅ APRÈS -->
<div class="top-bar__brand">
  <img src="../../images/logo.png" alt="Urgence Scolaire" style="width:40px; height:40px; object-fit:contain;" />
  <div class="user-info">
        <h1 id="prof-name">Professeur</h1>
        <span id="prof-location">Ville, Pays</span>
      </div>
    </div>

    <div class="top-bar__session">
      <div class="session-badge" id="session-badge">
        <span class="session-dot"></span>
        <span id="call-status">En attente d'un élève…</span>
      </div>
      <span id="call-time" class="call-timer"></span>
    </div>

    <div class="top-bar__actions">
      <button id="end-session-btn"  class="btn btn--danger btn--sm"  style="display:none;">✕ Terminer</button>
    
      <button id="logout-btn"       class="btn btn--ghost">🚪 Déconnexion</button>
    </div>

  </header>

  <!-- ================= LAYOUT ================= -->
  <main class="dashboard-layout">

    <!-- ================= COL PRINCIPALE ================= -->
    <div class="col-main">

      <!-- VIDEO -->
      <section class="card card--video">
        <div class="card__header">
          <h3 class="card__title">🎥 Session vidéo</h3>
        </div>

        <div class="videos">

          <div class="video-block video-block--remote">
            <div class="video-label">Élève</div>
            <div class="video-box">
              <video id="remoteVideo" autoplay playsinline></video>
              <div class="video-overlay video-overlay--live">LIVE</div>
              <div id="remote-eleve-info" class="video-waiting">En attente d'un élève…</div>
            </div>
          </div>

          <div class="video-block">
            <div class="video-label">Vous</div>
            <div class="video-box">
              <video id="localVideo" autoplay muted playsinline></video>
              <div class="video-overlay">CAM</div>
            </div>
          </div>
        </div>
      </section>

      <!-- WHITEBOARD -->
      <section class="card card--whiteboard">
        <div class="card__header">
          <h3 class="card__title">✏️ Tableau blanc</h3>
          <div class="wb-header-actions">
            <button id="wb-fullscreen-btn" class="btn btn--icon" title="Plein écran">⛶</button>
          </div>
        </div>

        <div class="whiteboard-canvas-wrapper" id="whiteboard-wrapper">
          <canvas id="whiteboard-canvas"></canvas>
        </div>

        <div class="whiteboard-tools">
          <div class="wb-tools-group">
            <button id="penToolBtn"    class="btn btn--icon wb-tool active" title="Crayon">✏️</button>
            <button id="eraserToolBtn" class="btn btn--icon wb-tool" title="Gomme">🧽</button>
            <button id="lineToolBtn"   class="btn btn--icon wb-tool" title="Ligne">📏</button>
            <button id="rectToolBtn"   class="btn btn--icon wb-tool" title="Rectangle">▭</button>
            <button id="textToolBtn"   class="btn btn--icon wb-tool" title="Texte">🔤</button>
          </div>

          <div class="wb-tools-group">
            <input type="color" id="whiteboardColor" value="#000000" class="wb-color-picker" title="Couleur" />
            <input type="range" id="whiteboardSize" min="1" max="20" value="3" class="wb-size-slider" title="Épaisseur" />
          </div>

          <div class="wb-tools-group wb-tools-group--right">
            <button id="undoWhiteboardBtn"     class="btn btn--icon" title="Annuler">↩</button>
            <button id="clearWhiteboardBtn"    class="btn btn--icon btn--danger-ghost" title="Effacer">🗑️</button>
            <button id="downloadWhiteboardBtn" class="btn btn--icon" title="Télécharger">⬇️</button>
          </div>
        </div>
      </section>

    </div>

    <!-- ================= SIDE PANEL ================= -->
    <aside class="side-panel">

      <!-- APPELS ENTRANTS -->
      <div class="card card--calls">
        <div class="card__header">
          <h3 class="card__title">📞 Appels entrants</h3>
        </div>

        <div id="no-call" class="no-call-msg">
          <span class="no-call-icon">◎</span>
          Aucun appel en cours
        </div>

        <div id="incoming-call-box" class="incoming-call" style="display:none;">
          <div class="incoming-call__ring">
            <span class="ring-pulse"></span>
            <span class="ring-icon">📞</span>
          </div>
          <div id="incoming-call-text" class="incoming-call__text">Appel d'un élève…</div>
          <div class="incoming-call__actions">
            <button id="accept-call-btn" class="btn btn--accept">✅ Accepter</button>
            <button id="cancel-call-btn" class="btn btn--reject">✕ Refuser</button>
          </div>
        </div>
      </div>

      <!-- CHAT -->
      <div class="card card--chat">
        <div class="card__header">
          <h3 class="card__title">💬 Chat</h3>
        </div>
        <div id="chat-box" class="chat-box"></div>
        <div class="chat-input-row">
          <input id="chat-input" class="chat-input" type="text" placeholder="Message…" autocomplete="off" />
          <button id="send-msg" class="btn btn--primary btn--sm">→</button>
        </div>
      </div>

      <!-- DOCUMENTS -->
      <div class="card card--docs">
        <div class="card__header">
          <h3 class="card__title">📂 Documents</h3>
        </div>
        <label class="file-drop-zone" for="file-input">
          <span>Glisser un fichier ici</span>
          <span class="file-drop-zone__sub">ou cliquer pour parcourir</span>
        </label>
        <input type="file" id="file-input" class="file-input-hidden" />
        <button id="send-file" class="btn btn--primary full-width">Envoyer</button>
        <ul id="doc-list" class="doc-list"></ul>
      </div>
      <!-- STRIPE CONNECT -->

<div id="user-info"></div>

<div class="card card--stripe-connect">
  <div class="card__header">
    <h3 class="card__title">💳 Stripe Connect (Vendeur)</h3>
  </div>
  <div class="card__body">
    <p class="text-muted small">Nécessaire pour recevoir vos paiements.</p>
    <button id="stripe-onboarding-btn" class="btn btn--primary full-width" style="display: none;">
      Connecter mon compte Stripe
    </button>
  </div>
</div>

    </aside>

  </main>

  <!-- Son d'appel entrant -->
  <audio id="incomingCallSound" src="/assets/sounds/call.mp3" preload="auto"></audio>

  <!-- JS — dashboard uniquement, il orchestre tout -->
  <script type="module" src="../../js/pages/professeur/dashboard.js"></script>
<script type="module">
  const stripeBtn = document.getElementById("stripe-onboarding-btn");

  stripeBtn.addEventListener("click", async () => {
    try {
      const token = localStorage.getItem("token");

      // 🌐 Détection automatique de l'environnement
const API_URL = window.location.hostname === "localhost" 
  ? "http://localhost:4000" 
  : "https://plateforme-scolaire-1.onrender.com"; // On retire le "/" final pour éviter les doubles slashes //

// 🚀 On utilise la variable dynamique `${API_URL}` ici :
const res = await fetch(`${API_URL}/api/v1/stripeConnect/onboarding`, {
  method: "POST",
  headers: {
    "Content-Type": "application/json",
    "Authorization": `Bearer ${token}`
  }
});

      const data = await res.json();

      if (data.stripeLink) {
        // Redirige vers le lien d'onboarding Stripe
        window.location.href = data.stripeLink;
      } else {
        alert("Votre compte Stripe est déjà connecté ou une erreur est survenue.");
      }
    } catch (err) {
      console.error("Erreur Stripe onboarding:", err);
      alert("Impossible de démarrer l'onboarding Stripe.");
    }
  });
</script>
</body>
</html>
