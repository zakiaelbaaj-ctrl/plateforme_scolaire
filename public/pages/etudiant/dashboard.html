<!-- ================= STRIPE ================= -->
<script>
// 1. Définition de l'URL de l'API (À GARDER ABSOLUMENT)
const API_URL = window.location.hostname === "localhost"
          ? "http://localhost:4000"
          : "https://plateforme-scolaire-1.onrender.com";

// 2. Logique du bouton d'ajout de carte
const stripeBtn = document.getElementById("stripe-setup-btn"); 
if (stripeBtn) {
  // 1. On ajoute "e" (l'événement) ici 👇
   stripeBtn.addEventListener("click", async (e) => {
    e.preventDefault();
    try {
        const token = localStorage.getItem("token");

        // ✅ Vérifie d'abord le statut
        const statusRes = await fetch(`${API_URL}/api/v1/stripe-student/status`, {
            headers: { "Authorization": `Bearer ${token}` }
        });
        const statusData = await statusRes.json();

        if (statusData.isSubscriber || statusData.status === "active") {
            alert("✅ Votre carte est déjà enregistrée et votre accès est actif.");
            return;
        }

        // Sinon procède à l'enregistrement
        const res = await fetch(`${API_URL}/api/v1/stripe-student/subscribe`, {
            method: "POST",
            headers: {
                "Authorization": `Bearer ${token}`,
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ planType: "monthly" })
        });

        const data = await res.json();
        if (data.url) {
            window.location.href = data.url;
        } else {
            alert("Erreur : " + (data.error || "Impossible d'accéder au paiement."));
        }
    } catch (err) {
        console.error("Erreur Stripe :", err);
        alert("Erreur lors de la connexion à Stripe.");
    }
});
}
</script>
