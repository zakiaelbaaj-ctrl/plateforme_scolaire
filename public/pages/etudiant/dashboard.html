<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Espace Étudiant</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/dashboard.css" />
</head>

<body>

<!-- ================= HEADER ================= -->
<header class="top-bar">
  <div class="user-info">
    <h1 id="student-info">Chargement…</h1>
    <span id="call-status">Aucune session</span>
  </div>

  <div class="actions">
    <span id="call-time">00:00</span>
    <button id="logout-btn" class="primary" aria-label="Se déconnecter">Déconnexion</button>
  </div>
</header>

<!-- ================= DASHBOARD ================= -->
<main class="dashboard-layout">

  <!-- ================= VIDEO AREA ================= -->
  <section class="video-area">

    <div class="card">
      <h3>🎥 Vidéo</h3>
      <div class="videos">

        <div class="video-block">
          <div class="video-label">Vous</div>
          <div class="video-box">
            <div id="local-video"></div>
          </div>
        </div>

        <div class="video-block">
          <div class="video-label">Professeur / Étudiant</div>
          <div class="video-box">
            <div id="remote-video"></div>
          </div>
        </div>

      </div>
    </div>

    <!-- ================= WHITEBOARD ================= -->
    <div class="card">
      <h3>🖊 Tableau blanc</h3>

      <div class="whiteboard-canvas-wrapper">
        <canvas id="whiteboard-canvas"></canvas>
      </div>

      <div class="whiteboard-tools">
        <button data-tool="pen" aria-label="Stylo">✏</button>
        <button data-tool="eraser" aria-label="Gomme">🧽</button>
        <button id="clearWhiteboardBtn" aria-label="Effacer le tableau">🗑</button>
      </div>
    </div>

  </section>

  <!-- ================= SIDE PANEL ================= -->
  <aside class="side-panel">

    <!-- MATCHING -->
    <div class="card">
      <h3>🔎 Recherche</h3>
      <input id="matiere" placeholder="Matière" aria-label="Matière" />
      <input id="sujet" placeholder="Sujet" aria-label="Sujet" />
      <button id="start-session-btn" class="full-width" aria-label="Commencer une session">Trouver un professeur</button>
    </div>

    <!-- CHAT -->
    <div class="card">
      <h3>💬 Chat</h3>
      <div class="chat-box" id="chat-box" aria-live="polite"></div>
      <div class="chat-input-row">
        <input id="chat-input" placeholder="Message…" aria-label="Message" />
        <button id="send-msg" aria-label="Envoyer le message">Envoyer</button>
      </div>
    </div>

    <!-- DOCUMENTS -->
    <div class="card">
      <h3>📁 Documents</h3>
      <input type="file" id="file-input" aria-label="Sélectionner un fichier" />
      <button id="send-file" class="full-width" aria-label="Envoyer le fichier">Envoyer</button>
      <ul class="files-list" id="doc-list" aria-label="Liste des documents"></ul>
    </div>

    <!-- STRIPE CONNECT -->
    <div class="card card--stripe-connect">
      <div class="card__header">
        <h3 class="card__title">💳 Stripe Connect</h3>
      </div>
      <div class="card__body">
        <button id="stripe-onboarding-btn" class="btn btn--primary full-width" aria-label="Connecter votre compte Stripe">
          Connecter mon compte Stripe
        </button>
      </div>
    </div>

  </aside>

</main>

<!-- ================= JS ================= -->
<script type="module" src="/js/core/state.js"></script>
<script type="module" src="/js/modules/ui/uiRenderers.js"></script>
<script type="module" src="/js/modules/ui/uiBindings.js"></script>
<script type="module" src="/js/pages/eleve/dashboard.js"></script>
<script type="module" src="/js/services/session.service.js"></script>
<script type="module" src="/js/services/whiteboard.service.js"></script>

<script type="module">
  // ================= STRIPE =================
  const stripeBtn = document.getElementById("stripe-onboarding-btn");

  stripeBtn.addEventListener("click", async () => {
    try {
      const token = localStorage.getItem("token");
      const res = await fetch("http://localhost:4000/api/v1/stripeConnect/onboarding", {
  method: "POST",
  headers: {
    "Content-Type": "application/json",
    "Authorization": `Bearer ${token}`
  }
});

      const data = await res.json();

      if (data.stripeLink) {
        window.location.href = data.stripeLink;
      } else {
        alert("Votre compte Stripe est déjà connecté ou une erreur est survenue.");
      }
    } catch (err) {
      console.error("Erreur Stripe onboarding:", err);
      alert("Impossible de démarrer l'onboarding Stripe.");
    }
  });
</script>

</body>
</html>
