<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Espace Élève</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@600;700;800&display=swap" rel="stylesheet" />
   <link rel="stylesheet" href="/css/fonts.css">
  <link rel="stylesheet" href="../../css/base.css" />
  <link rel="stylesheet" href="../../css/dashboard_eleve.css" />
  <link rel="stylesheet" href="../../css/components/rating.modal.css" />
  <script src="https://sdk.twilio.com/js/video/releases/2.30.0/twilio-video.min.js"></script>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0055ff">
  <link rel="apple-touch-icon" href="/assets/icons/icones.png">
  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">

</head>

<body>

  <!-- ================= HEADER ================= -->
  <header class="top-bar">

    <div class="top-bar__brand">
      <img src="../../images/logo.png" alt="Urgence Scolaire" style="width:40px; height:40px; object-fit:contain;" />
  <div class="user-info">
    <h1 id="eleve-name">Élève</h1>
    <span id="eleve-location">Ville, Pays</span>
  </div>
</div>
    <div class="top-bar__status">
      <div class="status-badge" id="call-status-badge">
        <span class="status-dot"></span>
        <span id="call-status">Aucune session</span>
      </div>
      <span id="call-time" class="call-timer">00:00</span>
    </div>

    <div class="actions">
  <span id="ws-status-badge" style="font-size:12px;">🟢 Connecté</span> <!-- ✅ -->
  <button id="logout-btn" class="primary" aria-label="Se déconnecter">Déconnexion</button>
</div>
</header>
  <!-- ================= PROF LIST BAR ================= -->
  <div class="prof-bar">
    <span class="prof-bar__label">👨‍🏫 Disponibles</span>
    <ul id="prof-list" class="prof-list">
      <li class="empty">Aucun professeur connecté</li>
    </ul>

    <div class="prof-scroll-arrows">
    <button class="prof-scroll-arrow" id="prof-scroll-up">▲</button>
  <button class="prof-scroll-arrow" id="prof-scroll-down">▼</button>
  </div>
  </div>
  <!-- ================= LAYOUT ================= -->
  <main class="dashboard-layout">

    <!-- ================= LEFT COLUMN ================= -->
    <div class="col-main">

      <!-- VIDEO AREA -->
      <section class="card card--video">
  <div class="card__header" style="cursor: move;">
    <h3 class="card__title">🎥 Vidéo</h3>

<div class="video-actions">

  <button id="toggle-collapse-btn" class="btn btn--icon btn--sm">
    ➖
  </button>

  <button id="btn-rejoindre" class="btn btn--primary btn--sm">
    ▶ Rejoindre
  </button>

  <button id="screen-share-btn" class="btn btn--icon btn--sm">
    🖥️
  </button>

  <button id="end-session-btn" class="btn btn--danger btn--sm">
    ✕
  </button>
    </div>
  </div>

  <div class="videos">
    
      <div class="video-block video-block--remote">
        <div id="remoteVideoContainer" class="video-box">
          <div class="video-overlay">PROFESSEUR</div>
        </div>
      </div>

      <div class="video-block video-block--local">
        <div id="localVideoContainer" class="video-box">
          <div class="video-overlay">VOUS</div>
        </div>
      </div>
    </div>
  </section>
         
      <!-- WHITEBOARD -->
      <section class="card card--whiteboard">
  <div class="card__header">
    <h3 class="card__title">🖊 Tableau blanc</h3>
    <div class="wb-header-actions">
      <button id="wb-fullscreen-btn" class="btn btn--icon" title="Plein écran">⛶</button>
    </div>
  </div>

  <div class="whiteboard-canvas-wrapper" id="whiteboard-wrapper">

    <!-- Canvas -->
    <canvas id="whiteboard-canvas"></canvas>

    <!-- Miniature vidéo flottante (prof) -->
    <div class="video-miniature" style="display:none;">
      <video id="remote-video-mini" autoplay playsinline muted></video>
    </div>

    <!-- Outils DANS le wrapper → visibles en fullscreen -->
    <div class="whiteboard-tools whiteboard-tools--overlay">
      <div class="wb-tools-group">
        <button id="pointToolBtn"  class="btn btn--icon wb-tool" title="Point">•</button>
        <button id="penToolBtn"    class="btn btn--icon wb-tool active" title="Stylo">✏️</button>
        <button id="eraserToolBtn" class="btn btn--icon wb-tool" title="Gomme">🧽</button>
        <button id="lineToolBtn"   class="btn btn--icon wb-tool" title="Ligne">📏</button>
        <button id="rectToolBtn"   class="btn btn--icon wb-tool" title="Rectangle">▭</button>
        <button id="circleToolBtn" class="btn btn--icon wb-tool" title="Cercle">⭕</button>
        <button id="textToolBtn"   class="btn btn--icon wb-tool" title="Texte">🔤</button>
      </div>
      <div class="wb-tools-group">
        <input type="color" id="whiteboardColor" value="#000000" class="wb-color-picker" title="Couleur" />
        <input type="range" id="whiteboardSize" min="1" max="20" value="3" class="wb-size-slider" title="Épaisseur" />
      </div>
      <div class="wb-tools-group wb-tools-group--right">
        <button id="undoWhiteboardBtn"     class="btn btn--icon" title="Annuler">↩</button>
        <button id="clearWhiteboardBtn"    class="btn btn--icon btn--danger-ghost" title="Effacer tout">🗑️</button>
        <button id="downloadWhiteboardBtn" class="btn btn--icon" title="Télécharger">⬇️</button>
      </div>
    </div>

  </div>
</section>

</div>

    <!-- ================= SIDE PANEL ================= -->
    <aside class="side-panel">
     <div id="user-info"></div>
      <!-- SESSION INFO -->
      <div class="card card--session">
        <div class="card__header">
          <h3 class="card__title">📞 Session</h3>
        </div>
        <p class="session-prof-info">
          <span class="label">Professeur</span>
          <span id="remote-prof-info" class="value">—</span>
        </p>
      </div>

      <!-- CHAT -->
      <div class="card card--chat">
        <div class="card__header">
          <h3 class="card__title">💬 Chat</h3>
        </div>
        <div id="chat-box" class="chat-box"></div>
        <div class="chat-input-row">
          <input id="chat-input" class="chat-input" placeholder="Message…" autocomplete="off" />
          <button id="send-msg" class="btn btn--primary btn--sm">→</button>
        </div>
      </div>

      <!-- DOCUMENTS -->
      <div class="card card--docs">
        <div class="card__header">
          <h3 class="card__title">📁 Documents</h3>
        </div>
        <label class="file-drop-zone" for="file-input">
          <span>Glisser un fichier ici</span>
          <span class="file-drop-zone__sub">ou cliquer pour parcourir</span>
        </label>
        <input type="file" id="file-input" class="file-input-hidden" />
        <!-- aperçu avant envoi -->
        <div id="selected-file-preview"></div>
        <button id="send-file" class="btn btn--primary full-width">Envoyer le document</button>
        <ul id="doc-list" class="doc-list"></ul>
      </div>

    </aside>  <!-- ← fermeture side-panel -->
  </main>     <!-- ← fermeture dashboard-layout -->
   <!-- Liste défilante profs — en dehors du main, position: fixed -->
  <!-- ================= JS ================= -->
  <script type="module" src="../../js/pages/eleve/dashboard.js"></script>
  <script type="module">
   const stripeBtn = document.getElementById("stripe-onboarding-btn");
   if (stripeBtn) {
    stripeBtn.addEventListener("click", async () => {
      try {
        const token = localStorage.getItem("token");
        const API_URL = window.location.hostname === "localhost" 
          ? "http://localhost:4000" 
          : "https://plateforme-scolaire-1.onrender.com";
        const res = await fetch(`${API_URL}/api/v1/stripeConnect/onboarding`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${token}`
          }
        });
        const data = await res.json();
        if (data.stripeLink) {
          window.location.href = data.stripeLink;
        } else {
          alert("Erreur : " + (data.message || "Lien Stripe non reçu."));
        }
      } catch (err) {
        console.error("Erreur Stripe onboarding:", err);
        alert("Le serveur est injoignable.");
      }
    });
  }
  
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("/sw.js");
  }
</script>
</body>
</html>
