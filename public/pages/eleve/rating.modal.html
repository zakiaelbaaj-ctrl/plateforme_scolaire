<div id="rating-modal" class="rating-modal" style="display:none;">
  <div class="rating-modal__box">

    <h3>Comment s'est passé votre cours ?</h3>
    <p id="rating-prof-name" class="rating-prof-name"></p>

    <div class="rating-stars" id="rating-stars">
      <span data-value="1">★</span>
      <span data-value="2">★</span>
      <span data-value="3">★</span>
      <span data-value="4">★</span>
      <span data-value="5">★</span>
    </div>

    <textarea
      id="rating-comment"
      class="rating-comment"
      placeholder="Commentaire optionnel..."
    ></textarea>

    <div class="rating-actions">
      <button id="rating-skip" class="btn btn--ghost btn--sm">Passer</button>
      <button id="rating-submit" class="btn btn--primary btn--sm">Envoyer</button>
    </div>

  </div>
</div>
