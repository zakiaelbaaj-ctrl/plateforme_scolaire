<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Paiement Annulé | Plateforme Scolaire</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    :root {
      --primary: #2563eb;
      --warning: #f59e0b;
      --text: #1f2937;
      --text-light: #6b7280;
      --bg: #fefce8; /* Jaune très léger pour le rappel d'attention */
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'IBM Plex Sans', sans-serif;
      background-color: #f9fafb;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: var(--text);
    }

    .container {
      background: white;
      padding: 3rem 2rem;
      border-radius: 1.25rem;
      box-shadow: 0 15px 30px -5px rgba(0, 0, 0, 0.1);
      text-align: center;
      max-width: 480px;
      width: 90%;
      border-top: 6px solid var(--warning);
    }

    .cancel-icon {
      width: 72px;
      height: 72px;
      background: #fffbeb;
      color: var(--warning);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      margin: 0 auto 1.5rem;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      margin: 0 0 1rem;
    }

    p {
      color: var(--text-light);
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    .help-box {
      background: #fffcf0;
      border: 1px solid #fef3c7;
      border-radius: 0.75rem;
      padding: 1rem;
      margin-bottom: 2rem;
      font-size: 0.9rem;
      text-align: left;
    }

    .help-box ul {
      margin: 0.5rem 0 0;
      padding-left: 1.25rem;
      color: var(--text-light);
    }

    .actions {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .btn {
      display: block;
      text-decoration: none;
      padding: 1rem;
      border-radius: 0.5rem;
      font-weight: 600;
      transition: all 0.2s;
    }

    .btn--primary {
      background-color: var(--primary);
      color: white;
      box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2);
    }

    .btn--ghost {
      background-color: transparent;
      color: var(--text-light);
      border: 1px solid #e5e7eb;
    }

    .btn:hover {
      transform: translateY(-1px);
      filter: brightness(1.1);
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="cancel-icon">!</div>
    <h1>Paiement interrompu</h1>
    <p>
      Malake, le paiement de votre session n'a pas été finalisé. Aucune somme n'a été prélevée.
    </p>

    <div class="help-box">
      <strong>Raisons possibles :</strong>
      <ul>
        <li>Action annulée manuellement.</li>
        <li>Problème de connexion avec la banque.</li>
        <li>Fonds insuffisants ou carte expirée.</li>
      </ul>
    </div>
    
    <div class="actions">
      <a href="/pages/eleve/dashboard.html" class="btn btn--primary">Réessayer le paiement</a>
      <a href="/pages/eleve/dashboard.html" class="btn btn--ghost">Retour au Dashboard</a>
    </div>
  </div>

</body>
</html>
