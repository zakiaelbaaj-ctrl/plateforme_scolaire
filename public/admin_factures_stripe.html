<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin – Factures Stripe</title>

  <!-- Dark mode premium -->
  <link rel="stylesheet" href="/css/admin_dark.css">
</head>

<body class="admin-page">

<!-- ============================
     HEADER
============================= -->
<header class="page-header">
  <div class="container">
    <h1>🧾 Factures Stripe (Officielles)</h1>
    <p class="meta" id="invoiceCount">Chargement...</p>
  </div>
</header>

<!-- ============================
     CONTENU PRINCIPAL
============================= -->
<main class="container">

  <!-- Zone d’actions -->
  <section class="controls">
    <input 
      type="text" 
      id="searchInput" 
      placeholder="🔍 Rechercher une facture Stripe..."
      aria-label="Rechercher une facture Stripe"
    >
    <button class="validate-btn" onclick="loadStripeInvoices()">🔄 Rafraîchir</button>
  </section>

  <!-- Tableau -->
  <section class="table-wrapper" aria-label="Factures Stripe">
    <table class="table" id="invoiceTable">
      <thead>
        <tr>
          <th>#</th>
          <th>Élève</th>
          <th>Email</th>
          <th>Montant</th>
          <th>Devise</th>
          <th>Status</th>
          <th>Date</th>
          <th>Invoice ID</th>
          <th>PDF</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <!-- Factures injectées ici -->
      </tbody>
    </table>
  </section>

  <!-- Retour -->
  <footer class="page-footer">
    <a href="dashboard_admin.html" class="back-home">⬅️ Retour à l'accueil</a>
  </footer>

</main>

<!-- ============================
     MODAL
============================= -->
<div id="confirmModal" class="modal" aria-hidden="true">
  <div class="modal-content">
    <h3 id="modalTitle">Confirmation</h3>
    <p id="modalMessage"></p>
    <div class="modal-buttons">
      <button class="btn-cancel" onclick="closeModal()">Annuler</button>
      <button class="btn-confirm" onclick="confirmAction()">Confirmer</button>
    </div>
  </div>
</div>

<!-- ============================
     SCRIPT
============================= -->
<script>
let invoices = [];
let filteredInvoices = [];
let pendingAction = null;

/* ============================================================
   FETCH FACTURES STRIPE
============================================================ */
async function loadStripeInvoices() {
  try {
    const token = localStorage.getItem("token");
    if (!token) throw new Error("Token manquant — reconnecte-toi");

    const res = await fetch("http://localhost:4000/api/v1/admin/stripe/invoices", {
      headers: { "Authorization": `Bearer ${token}` }
    });

    const json = await res.json();
    if (!res.ok || json.success !== true) throw new Error(json.message);

    invoices = json.data.map(formatInvoice);
    filteredInvoices = [...invoices];

    afficherInvoices();

  } catch (err) {
    alert("❌ " + err.message);
  }
}

/* ============================================================
   FORMATAGE DES DONNÉES
============================================================ */
function formatInvoice(i) {
  return {
    id: i.id,
    fullname: `${i.prenom || ""} ${i.nom || ""}`.trim(),
    email: i.email || "—",
    montant: (i.amount_due || 0) / 100,
    devise: i.currency?.toUpperCase() || "EUR",
    status: i.status || "unknown",
    date: i.created ? new Date(i.created * 1000) : null,
    invoice_id: i.invoice_id || "—",
    pdf_url: i.pdf_url || null
  };
}

/* ============================================================
   AFFICHAGE TABLEAU
============================================================ */
function afficherInvoices() {
  const tbody = document.querySelector("#invoiceTable tbody");
  const count = document.getElementById("invoiceCount");

  tbody.innerHTML = "";
  count.textContent = `${filteredInvoices.length} facture(s) Stripe`;

  if (filteredInvoices.length === 0) {
    tbody.innerHTML = `<tr><td colspan="10" class="empty-state">Aucune facture Stripe trouvée.</td></tr>`;
    return;
  }

  filteredInvoices.forEach((f, i) => {
    const statusClass =
      f.status === "paid" ? "validated" :
      f.status === "open" ? "pending" : "danger";

    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${i + 1}</td>
      <td>${escapeHtml(f.fullname)}</td>
      <td>${escapeHtml(f.email)}</td>
      <td>${f.montant.toFixed(2)}</td>
      <td>${f.devise}</td>
      <td><span class="status ${statusClass}">${f.status}</span></td>
      <td>${f.date ? f.date.toLocaleDateString() : "—"}</td>
      <td>${escapeHtml(f.invoice_id)}</td>
      <td>
        ${f.pdf_url 
          ? `<a href="${f.pdf_url}" target="_blank" class="validate-btn">PDF</a>`
          : "—"
        }
      </td>
      <td class="actions">
        <button class="delete-btn" onclick="openDeleteModal(${i})">Supprimer</button>
      </td>
    `;
    tbody.appendChild(tr);
  });
}

/* ============================================================
   RECHERCHE
============================================================ */
document.getElementById("searchInput").addEventListener("input", (e) => {
  const q = e.target.value.toLowerCase();

  filteredInvoices = invoices.filter(f =>
    `${f.fullname} ${f.email} ${f.invoice_id}`.toLowerCase().includes(q)
  );

  afficherInvoices();
});

/* ============================================================
   MODAL
============================================================ */
function openDeleteModal(i) {
  pendingAction = { type: "delete", index: i };
  showModal("Supprimer cette facture Stripe ?", "Cette action est irréversible.");
}

function showModal(title, message) {
  document.getElementById("modalTitle").textContent = title;
  document.getElementById("modalMessage").textContent = message;
  document.getElementById("confirmModal").setAttribute("aria-hidden", "false");
}

function closeModal() {
  pendingAction = null;
  document.getElementById("confirmModal").setAttribute("aria-hidden", "true");
}

/* ============================================================
   CONFIRMATION ACTION
============================================================ */
async function confirmAction() {
  if (!pendingAction) return;

  const { index } = pendingAction;
  const f = filteredInvoices[index];
  const token = localStorage.getItem("token");

  try {
    await fetch(`http://localhost:4000/api/v1/admin/stripe/invoices/${f.id}`, {
      method: "DELETE",
      headers: { "Authorization": `Bearer ${token}` }
    });

    invoices = invoices.filter(x => x.id !== f.id);
    filteredInvoices = filteredInvoices.filter(x => x.id !== f.id);

    afficherInvoices();

  } catch (err) {
    alert("❌ Erreur lors de la suppression");
  }

  closeModal();
}

/* ============================================================
   UTILITAIRES
============================================================ */
function escapeHtml(text) {
  const div = document.createElement("div");
  div.textContent = text;
  return div.innerHTML;
}

/* ============================================================
   INIT
============================================================ */
loadStripeInvoices();
</script>

</body>
</html>
