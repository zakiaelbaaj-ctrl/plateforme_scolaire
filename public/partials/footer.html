<!-- public/partials/footer.html -->
<footer id="site-footer" class="ps-footer" role="contentinfo" aria-label="Pied de page">
  <div class="ps-footer-inner" style="max-width:1200px;margin:0 auto;padding:24px;display:flex;flex-wrap:wrap;gap:16px;align-items:center;justify-content:space-between;">
    <div class="ps-footer-brand" style="display:flex;align-items:center;gap:12px;">
      <svg width="40" height="40" viewBox="0 0 24 24" aria-hidden="true" focusable="false" style="flex:0 0 40px;">
        <rect width="24" height="24" rx="4" fill="#0b5fff"></rect>
        <text x="12" y="16" text-anchor="middle" font-size="12" fill="#fff" font-family="sans-serif">PS</text>
      </svg>
      <div>
        <div style="font-weight:600">Plateforme Scolaire</div>
        <div style="font-size:13px;color:#6b7280">Espace élève</div>
      </div>
    </div>

    <nav class="ps-footer-nav" aria-label="Liens utiles" style="display:flex;gap:12px;flex-wrap:wrap;">
      <a href="/aide.html" class="ps-footer-link">Aide</a>
      <a href="/mentions-legales.html" class="ps-footer-link">Mentions légales</a>
      <a href="/confidentialite.html" class="ps-footer-link">Confidentialité</a>
      <a href="/contact.html" class="ps-footer-link">Contact</a>
    </nav>

    <div class="ps-footer-controls" style="display:flex;gap:12px;align-items:center;">
      <label for="langSelect" class="visually-hidden">Choisir la langue</label>
      <select id="langSelect" aria-label="Langue" class="ps-select" style="padding:6px;border-radius:6px;border:1px solid #e5e7eb;">
        <option value="fr">Français</option>
        <option value="en">English</option>
      </select>

      <button id="themeToggle" class="ps-btn" aria-pressed="false" aria-label="Basculer le thème" style="padding:6px 10px;border-radius:6px;border:1px solid #e5e7eb;background:#fff;">
        Thème
      </button>
    </div>

    <div class="ps-footer-meta" style="width:100%;margin-top:12px;display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;">
      <small style="color:#6b7280">© <span id="currentYear"></span> Plateforme Scolaire — Tous droits réservés.</small>

      <div style="display:flex;gap:8px;align-items:center;">
        <a href="/rss.xml" class="ps-footer-link" aria-label="Flux RSS">RSS</a>
        <a href="/status.html" class="ps-footer-link" aria-label="Statut du service">Statut</a>
        <span style="color:#9ca3af;font-size:13px">v<span id="appVersion" data-version="1.0.0">1.0.0</span></span>
      </div>
    </div>
  </div>

  <!-- Accessible live region for transient messages -->
  <div id="footer-live" aria-live="polite" aria-atomic="true" class="visually-hidden" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0);white-space:nowrap;"></div>

  <!-- Minimal inline script: update year, theme toggle, language persistence -->
  <script>
    (function () {
      // Update year
      const yearEl = document.getElementById('currentYear');
      if (yearEl) yearEl.textContent = new Date().getFullYear();

      // App version: keep data-version as source of truth
      const verEl = document.getElementById('appVersion');
      if (verEl && verEl.dataset && verEl.dataset.version) {
        verEl.textContent = verEl.dataset.version;
      }

      // Theme toggle: persists choice in localStorage, updates document attribute
      const themeToggle = document.getElementById('themeToggle');
      const THEME_KEY = 'ps:theme';
      function applyTheme(t) {
        if (t === 'dark') {
          document.documentElement.setAttribute('data-theme', 'dark');
          themeToggle.setAttribute('aria-pressed', 'true');
          themeToggle.textContent = 'Sombre';
        } else {
          document.documentElement.setAttribute('data-theme', 'light');
          themeToggle.setAttribute('aria-pressed', 'false');
          themeToggle.textContent = 'Clair';
        }
      }
      try {
        const saved = localStorage.getItem(THEME_KEY);
        applyTheme(saved === 'dark' ? 'dark' : 'light');
      } catch (e) { applyTheme('light'); }

      if (themeToggle) {
        themeToggle.addEventListener('click', () => {
          try {
            const current = document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'light';
            const next = current === 'dark' ? 'light' : 'dark';
            applyTheme(next);
            localStorage.setItem(THEME_KEY, next);
          } catch (e) {
            // ignore storage errors
            applyTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
          }
        });
      }

      // Language selector: persist selection and emit event for other modules
      const langSelect = document.getElementById('langSelect');
      const LANG_KEY = 'ps:lang';
      try {
        const savedLang = localStorage.getItem(LANG_KEY);
        if (savedLang && langSelect) langSelect.value = savedLang;
      } catch (e) { /* ignore */ }

      if (langSelect) {
        langSelect.addEventListener('change', (e) => {
          try { localStorage.setItem(LANG_KEY, e.target.value); } catch (err) { /* ignore */ }
          // dispatch a CustomEvent so other modules can react
          try { document.dispatchEvent(new CustomEvent('ps:lang:change', { detail: { lang: e.target.value } })); } catch (err) { /* ignore */ }
          const live = document.getElementById('footer-live');
          if (live) live.textContent = e.target.value === 'fr' ? 'Langue : Français' : 'Language: English';
        });
      }

      // Expose small API for footer interactions (debug only)
      if (window && window.location && window.location.search.indexOf('debug=1') !== -1) {
        window.__psFooter = {
          setVersion(v) { if (verEl) verEl.textContent = v; },
          setYear(y) { if (yearEl) yearEl.textContent = y; },
        };
      }
    })();
  </script>

  <style>
    /* Minimal footer styles; project should include global CSS instead */
    .ps-footer { background: #f9fafb; color: #111827; border-top: 1px solid #e6e9ee; }
    .ps-footer a.ps-footer-link { color: #0b5fff; text-decoration: none; font-size:14px; }
    .ps-footer a.ps-footer-link:hover { text-decoration: underline; }
    .visually-hidden { position:absolute !important; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden; clip:rect(0 0 0 0); white-space:nowrap; border:0; }
    @media (max-width:720px) {
      .ps-footer-inner { padding:16px; flex-direction:column; align-items:flex-start; }
      .ps-footer-meta { justify-content:flex-start; gap:8px; }
    }
    /* Dark theme support */
    :root[data-theme="dark"] .ps-footer { background:#0b1220; color:#e6eef8; border-top-color:#0f1724; }
    :root[data-theme="dark"] .ps-footer a.ps-footer-link { color:#7fb3ff; }
  </style>
</footer>
