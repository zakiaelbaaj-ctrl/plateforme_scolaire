<!-- public/partials/header.html -->
<header id="site-header" class="ps-header" role="banner" aria-label="En-tête du site">
  <div class="ps-header-inner" style="max-width:1200px;margin:0 auto;display:flex;align-items:center;gap:16px;padding:16px;">
    <!-- Brand / Logo -->
    <a href="/" class="ps-brand" aria-label="Accueil Plateforme Scolaire" style="display:flex;align-items:center;gap:12px;text-decoration:none;color:inherit;">
      <svg width="40" height="40" viewBox="0 0 24 24" aria-hidden="true" focusable="false" style="flex:0 0 40px;">
        <rect width="24" height="24" rx="4" fill="#0b5fff"></rect>
        <text x="12" y="16" text-anchor="middle" font-size="12" fill="#fff" font-family="sans-serif">PS</text>
      </svg>
      <div style="line-height:1;">
        <div style="font-weight:700;font-size:16px">Plateforme Scolaire</div>
        <div style="font-size:12px;color:#6b7280">Espace élève</div>
      </div>
    </a>

    <!-- Primary navigation -->
    <nav class="ps-nav" aria-label="Navigation principale" style="display:flex;gap:12px;margin-left:12px;">
      <a href="/dashboard.html" class="ps-nav-link">Tableau de bord</a>
      <a href="/cours.html" class="ps-nav-link">Cours</a>
      <a href="/calendrier.html" class="ps-nav-link">Calendrier</a>
      <a href="/ressources.html" class="ps-nav-link">Ressources</a>
    </nav>

    <!-- Spacer -->
    <div style="flex:1"></div>

    <!-- Search -->
    <div class="ps-search" role="search" style="position:relative;">
      <label for="siteSearch" class="visually-hidden">Rechercher</label>
      <input id="siteSearch" type="search" placeholder="Rechercher une matière, un cours..." aria-label="Rechercher" style="padding:8px 36px 8px 12px;border-radius:8px;border:1px solid #e5e7eb;min-width:220px;">
      <button id="searchBtn" aria-label="Lancer la recherche" style="position:absolute;right:4px;top:4px;border:0;background:transparent;padding:6px;cursor:pointer;">
        🔍
      </button>
    </div>

    <!-- User area -->
    <div class="ps-user" style="display:flex;align-items:center;gap:12px;margin-left:12px;">
      <div id="notifWrap" style="position:relative;">
        <button id="notifBtn" aria-label="Notifications" class="ps-icon-btn" style="background:transparent;border:0;cursor:pointer;font-size:18px;">🔔
          <span id="notifBadge" aria-hidden="true" style="display:none;position:absolute;top:-6px;right:-6px;background:#ef4444;color:#fff;border-radius:999px;padding:2px 6px;font-size:11px;">0</span>
        </button>
      </div>

      <div id="userMenuWrap" style="position:relative;">
        <button id="userMenuBtn" aria-haspopup="true" aria-expanded="false" aria-controls="userMenu" class="ps-user-btn" style="display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:8px;border:1px solid #e5e7eb;background:#fff;cursor:pointer;">
          <span id="userAvatar" aria-hidden="true" style="width:32px;height:32px;border-radius:50%;background:#c7d2fe;display:inline-flex;align-items:center;justify-content:center;font-weight:700;color:#0b5fff;">U</span>
          <span id="userName" style="font-size:14px;color:#111827">Invité</span>
          <svg width="12" height="12" viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M7 10l5 5 5-5z" fill="#6b7280"/></svg>
        </button>

        <div id="userMenu" role="menu" aria-hidden="true" style="position:absolute;right:0;top:44px;min-width:180px;background:#fff;border:1px solid #e5e7eb;border-radius:8px;box-shadow:0 8px 24px rgba(2,6,23,0.08);display:none;z-index:1000;">
          <a href="/profil.html" role="menuitem" class="ps-menu-item" style="display:block;padding:10px 12px;text-decoration:none;color:inherit;">Mon profil</a>
          <a href="/parametres.html" role="menuitem" class="ps-menu-item" style="display:block;padding:10px 12px;text-decoration:none;color:inherit;">Paramètres</a>
          <button id="logoutBtn" role="menuitem" class="ps-menu-item" style="display:block;width:100%;text-align:left;padding:10px 12px;border:0;background:transparent;cursor:pointer;">Se déconnecter</button>
        </div>
      </div>

      <!-- Mobile menu toggle -->
      <button id="mobileMenuBtn" aria-label="Ouvrir le menu" aria-expanded="false" style="display:none;border:0;background:transparent;padding:8px;cursor:pointer;font-size:20px;">☰</button>
    </div>
  </div>

  <!-- Minimal inline script: menu toggles, auth-aware UI, search handling -->
  <script>
    (function () {
      // Utility helpers
      function qs(id) { return document.getElementById(id); }
      function show(el) { if (!el) return; el.style.display = ''; el.setAttribute('aria-hidden', 'false'); }
      function hide(el) { if (!el) return; el.style.display = 'none'; el.setAttribute('aria-hidden', 'true'); }

      // Elements
      const userMenuBtn = qs('userMenuBtn');
      const userMenu = qs('userMenu');
      const userName = qs('userName');
      const userAvatar = qs('userAvatar');
      const logoutBtn = qs('logoutBtn');
      const notifBadge = qs('notifBadge');
      const notifBtn = qs('notifBtn');
      const searchInput = qs('siteSearch');
      const searchBtn = qs('searchBtn');

      // Read simple auth info from localStorage (adminToken or stored user)
      // This is intentionally lightweight: your auth module may provide richer APIs.
      function getStoredUser() {
        try {
          const raw = localStorage.getItem('ps:auth:user') || localStorage.getItem('user');
          if (!raw) return null;
          return JSON.parse(raw);
        } catch (e) { return null; }
      }

      function updateUserUI() {
        const user = getStoredUser();
        if (user && user.name) {
          userName.textContent = user.name;
          userAvatar.textContent = (user.name.split(' ').map(s => s[0]).slice(0,2).join('') || 'U').toUpperCase();
        } else if (localStorage.getItem && localStorage.getItem('adminToken')) {
          userName.textContent = 'Administrateur';
          userAvatar.textContent = 'A';
        } else {
          userName.textContent = 'Invité';
          userAvatar.textContent = 'U';
        }
      }

      // Toggle user menu
      function toggleUserMenu() {
        const expanded = userMenuBtn.getAttribute('aria-expanded') === 'true';
        userMenuBtn.setAttribute('aria-expanded', String(!expanded));
        if (expanded) {
          userMenu.style.display = 'none';
          userMenu.setAttribute('aria-hidden', 'true');
        } else {
          userMenu.style.display = 'block';
          userMenu.setAttribute('aria-hidden', 'false');
        }
      }

      // Close menus when clicking outside
      document.addEventListener('click', (e) => {
        if (!userMenu.contains(e.target) && !userMenuBtn.contains(e.target)) {
          userMenu.style.display = 'none';
          userMenu.setAttribute('aria-hidden', 'true');
          userMenuBtn.setAttribute('aria-expanded', 'false');
        }
      });

      // Attach handlers
      if (userMenuBtn) userMenuBtn.addEventListener('click', (e) => { e.stopPropagation(); toggleUserMenu(); });
      if (logoutBtn) logoutBtn.addEventListener('click', () => {
        try {
          // Clear adminToken and module storage keys used by auth
          try { localStorage.removeItem('adminToken'); } catch (e) {}
          try { localStorage.removeItem('ps:auth:token'); localStorage.removeItem('ps:auth:refreshToken'); localStorage.removeItem('ps:auth:user'); } catch (e) {}
        } catch (e) { /* ignore */ }
        // Redirect to login page
        window.location.href = '/login.html';
      });

      // Notification badge example (update via custom event)
      document.addEventListener('ps:notifications:update', (ev) => {
        const count = ev.detail && ev.detail.count ? Number(ev.detail.count) : 0;
        if (count > 0) {
          notifBadge.textContent = String(count);
          notifBadge.style.display = 'inline-block';
        } else {
          notifBadge.style.display = 'none';
        }
      });

      // Search handling: navigate to search page with query param
      function doSearch() {
        const q = (searchInput && searchInput.value || '').trim();
        if (!q) return;
        const url = '/search.html?q=' + encodeURIComponent(q);
        window.location.href = url;
      }
      if (searchBtn) searchBtn.addEventListener('click', doSearch);
      if (searchInput) searchInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') doSearch(); });

      // Initialize UI
      updateUserUI();

      // Responsive: show mobile menu button on small screens
      function handleResize() {
        const mobileBtn = qs('mobileMenuBtn');
        const nav = document.querySelector('.ps-nav');
        if (!mobileBtn || !nav) return;
        if (window.innerWidth <= 720) {
          mobileBtn.style.display = '';
          nav.style.display = 'none';
          mobileBtn.setAttribute('aria-expanded', 'false');
          mobileBtn.addEventListener('click', () => {
            const expanded = mobileBtn.getAttribute('aria-expanded') === 'true';
            mobileBtn.setAttribute('aria-expanded', String(!expanded));
            nav.style.display = expanded ? 'none' : 'flex';
            nav.style.flexDirection = 'column';
            nav.style.gap = '8px';
          });
        } else {
          mobileBtn.style.display = 'none';
          nav.style.display = 'flex';
          nav.style.flexDirection = '';
        }
      }
      window.addEventListener('resize', handleResize);
      handleResize();

      // Expose small API for other modules to update header state
      window.__psHeader = {
        setUser(user) {
          try {
            if (user) localStorage.setItem('ps:auth:user', JSON.stringify(user));
            updateUserUI();
          } catch (e) { /* ignore */ }
        },
        setNotifCount(count) {
          const ev = new CustomEvent('ps:notifications:update', { detail: { count } });
          document.dispatchEvent(ev);
        }
      };
    })();
  </script>

  <style>
    /* Minimal header styles; project should include global CSS instead */
    .ps-header { background: #fff; border-bottom: 1px solid #e6e9ee; position:sticky; top:0; z-index:50; }
    .ps-nav a.ps-nav-link { color:#111827; text-decoration:none; padding:8px 10px; border-radius:6px; font-size:14px; }
    .ps-nav a.ps-nav-link:hover { background:#f3f4f6; }
    .ps-user-btn { font-size:14px; }
    .ps-menu-item { font-size:14px; color:#111827; }
    .ps-menu-item:hover { background:#f8fafc; }
    .ps-icon-btn { font-size:18px; }
    .visually-hidden { position:absolute !important; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden; clip:rect(0 0 0 0); white-space:nowrap; border:0; }
    @media (max-width:720px) {
      .ps-header-inner { padding:12px; gap:8px; }
      .ps-search input { min-width:120px; }
    }
    :root[data-theme="dark"] .ps-header { background:#071029; border-bottom-color:#0f1724; color:#e6eef8; }
    :root[data-theme="dark"] .ps-nav a.ps-nav-link { color:#e6eef8; }
  </style>
</header>
