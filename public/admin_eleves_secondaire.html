<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin – Élèves du Secondaire</title>

  <!-- CSS Admin Senior+++ -->
  <link rel="stylesheet" href="public/css/admin.css">
</head>

<body class="admin-page">

<!-- ============================
     HEADER
============================= -->
<header class="page-header">
  <div class="container">
    <h1>🏫 Gestion des Élèves du Secondaire</h1>
    <p class="meta" id="eleveCount">Chargement...</p>
  </div>
</header>

<!-- ============================
     CONTENU PRINCIPAL
============================= -->
<main class="container">

  <!-- Zone d’actions -->
  <section class="controls">
    <input 
      type="text" 
      id="searchInput" 
      placeholder="🔍 Rechercher un élève..."
      aria-label="Rechercher un élève"
    >
    <button class="validate-btn" onclick="chargerEleves()">🔄 Rafraîchir</button>
  </section>

  <!-- Tableau -->
  <section class="table-wrapper" aria-label="Liste des élèves du secondaire">
    <table class="table" id="eleveTable">
      <thead>
        <tr>
          <th>#</th>
          <th>Nom</th>
          <th>Prénom</th>
          <th>Niveau</th>
          <th>Classe</th>
          <th>Parent</th>
          <th>Email parent</th>
          <th>Téléphone parent</th>
          <th>Statut</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <!-- Élèves injectés ici -->
      </tbody>
    </table>
  </section>

  <!-- Retour -->
  <footer class="page-footer">
    <a href="dashboard_admin.html" class="back-home">⬅️ Retour à l'accueil</a>
  </footer>

</main>

<!-- ============================
     MODAL
============================= -->
<div id="confirmModal" class="modal" aria-hidden="true" role="dialog" aria-modal="true">
  <div class="modal-content">
    <h3 id="modalTitle">Confirmation</h3>
    <p id="modalMessage"></p>
    <div class="modal-buttons">
      <button class="btn-cancel" onclick="closeModal()">Annuler</button>
      <button class="btn-confirm" onclick="confirmAction()">Confirmer</button>
    </div>
  </div>
</div>

<!-- ============================
     SCRIPT
============================= -->
<script>
let eleves = [];
let filteredEleves = [];
let pendingAction = null;

/* -----------------------------
   FETCH DES ÉLÈVES
----------------------------- */
async function chargerEleves() {
  try {
    const token = localStorage.getItem("token");
    if (!token) throw new Error("Token manquant — reconnecte-toi");

    const res = await fetch("http://localhost:4000/api/v1/admin/eleves?cycle=secondaire", {
      headers: { "Authorization": `Bearer ${token}` }
    });

    const json = await res.json();
    if (!res.ok || json.success !== true) throw new Error(json.message);

    eleves = json.eleves.map(e => ({
      id: e.id,
      nom: e.nom || "—",
      prenom: e.prenom || "—",
      niveau: e.niveau || "—", // 6e, 5e, 4e, 3e, 2nde, 1ère, Terminale
      classe: e.classe || "—",
      parent_nom: e.parent_nom || "—",
      parent_email: e.parent_email || "—",
      parent_tel: e.parent_tel || "—",
      statut: e.statut || "en_attente"
    }));

    filteredEleves = [...eleves];
    afficherEleves();

  } catch (err) {
    alert("❌ " + err.message);
  }
}

/* -----------------------------
   AFFICHAGE TABLEAU
----------------------------- */
function afficherEleves() {
  const tbody = document.querySelector("#eleveTable tbody");
  const count = document.getElementById("eleveCount");

  tbody.innerHTML = "";
  count.textContent = `${filteredEleves.length} élève(s)`;

  if (filteredEleves.length === 0) {
    tbody.innerHTML = `<tr><td colspan="10" class="empty-state">Aucun élève trouvé.</td></tr>`;
    return;
  }

  filteredEleves.forEach((e, i) => {
    const statusClass =
      e.statut === "valide" ? "validated" :
      e.statut === "en_attente" ? "pending" : "danger";

    const statusText =
      e.statut === "valide" ? "✔ Validé" :
      e.statut === "en_attente" ? "⏳ En attente" :
      `⛔ ${e.statut}`;

    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${i + 1}</td>
      <td>${e.nom}</td>
      <td>${e.prenom}</td>
      <td>${e.niveau}</td>
      <td>${e.classe}</td>
      <td>${e.parent_nom}</td>
      <td>${e.parent_email}</td>
      <td>${e.parent_tel}</td>
      <td><span class="status ${statusClass}">${statusText}</span></td>
      <td class="actions">
        <button class="validate-btn" onclick="changerStatut(${i}, 'valide')">Valider</button>
        <button class="btn-cancel" onclick="changerStatut(${i}, 'en_attente')">Attente</button>
        <button class="delete-btn" onclick="openDeleteModal(${i})">Supprimer</button>
      </td>
    `;
    tbody.appendChild(tr);
  });
}

/* -----------------------------
   RECHERCHE
----------------------------- */
document.getElementById("searchInput").addEventListener("input", (e) => {
  const q = e.target.value.toLowerCase();
  filteredEleves = eleves.filter(e =>
    `${e.nom} ${e.prenom} ${e.parent_nom}`.toLowerCase().includes(q)
  );
  afficherEleves();
});

/* -----------------------------
   CHANGEMENT STATUT
----------------------------- */
async function changerStatut(index, statut) {
  const eleve = filteredEleves[index];
  const token = localStorage.getItem("token");

  try {
    await fetch(`http://localhost:4000/api/v1/admin/eleves/${eleve.id}`, {
      method: "PATCH",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${token}`
      },
      body: JSON.stringify({ statut })
    });

    eleve.statut = statut;
    afficherEleves();

  } catch (err) {
    alert("❌ Erreur lors de la mise à jour du statut");
  }
}

/* -----------------------------
   SUPPRESSION
----------------------------- */
function openDeleteModal(index) {
  pendingAction = { type: "delete", index };
  showModal("Supprimer cet élève ?", "Cette action est irréversible.");
}

async function confirmAction() {
  if (!pendingAction) return;

  const { index } = pendingAction;
  const eleve = filteredEleves[index];
  const token = localStorage.getItem("token");

  try {
    await fetch(`http://localhost:4000/api/v1/admin/eleves/${eleve.id}`, {
      method: "DELETE",
      headers: { "Authorization": `Bearer ${token}` }
    });

    eleves = eleves.filter(e => e.id !== eleve.id);
    filteredEleves = filteredEleves.filter(e => e.id !== eleve.id);

    afficherEleves();
  } catch (err) {
    alert("❌ Erreur lors de la suppression");
  }

  closeModal();
}

/* -----------------------------
   MODAL
----------------------------- */
function showModal(title, message) {
  document.getElementById("modalTitle").textContent = title;
  document.getElementById("modalMessage").textContent = message;
  document.getElementById("confirmModal").setAttribute("aria-hidden", "false");
}

function closeModal() {
  pendingAction = null;
  document.getElementById("confirmModal").setAttribute("aria-hidden", "true");
}

/* -----------------------------
   INIT
----------------------------- */
chargerEleves();
</script>

</body>
</html>
