<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion Admin</title>

  <link rel="stylesheet" href="css/base.css">

  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      background: #f5f5f5;
      font-family: Verdana, sans-serif;
    }

    .container {
      background: white;
      border-radius: 10px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
      width: 100%;
      max-width: 400px;
      padding: 40px;
    }

    h1 {
      text-align: center;
      color: #333;
      margin-bottom: 30px;
      font-size: 26px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #444;
      font-weight: 600;
    }

    input {
      width: 100%;
      padding: 12px;
      border: 2px solid #ddd;
      border-radius: 5px;
      font-size: 16px;
    }

    input:focus {
      outline: none;
      border-color: #007bff;
    }

    button {
      width: 100%;
      padding: 12px;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    button:hover:not(:disabled) {
      filter: brightness(0.9);
    }

    .error,
    .success {
      margin-top: 15px;
      padding: 12px;
      border-radius: 5px;
      text-align: center;
      display: none;
    }

    .error {
      background: #fee;
      color: #c33;
      border: 1px solid #fcc;
    }

    .success {
      background: #efe;
      color: #3c3;
      border: 1px solid #cfc;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>🔐 Connexion Admin</h1>

    <form id="loginForm" novalidate>
      <div class="form-group">
        <label for="username">Nom d'utilisateur</label>
        <input
          type="text"
          id="username"
          name="username"
          required
          autocomplete="username"
        >
      </div>

      <div class="form-group">
        <label for="password">Mot de passe</label>
        <input
          type="password"
          id="password"
          name="password"
          required
          autocomplete="current-password"
        >
      </div>

      <button type="submit">Se connecter</button>

      <div id="errorDiv" class="error"></div>
      <div id="successDiv" class="success"></div>
    </form>
  </div>

  <script>
    const form = document.getElementById("loginForm");
    const errorDiv = document.getElementById("errorDiv");
    const successDiv = document.getElementById("successDiv");
    const submitButton = form.querySelector("button");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      errorDiv.style.display = "none";
      successDiv.style.display = "none";
      submitButton.disabled = true;

      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;

      try {
        const res = await fetch("http://localhost:4000/api/v1/auth/login", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ username, password })
        });

        const json = await res.json();
        console.log("REPONSE SERVEUR :", json);

        // 1. Vérification du succès (ton serveur renvoie success: true)
        if (!res.ok || json.success !== true) {
          throw new Error(json.message || "Identifiants incorrects");
        }

        // 2. Récupération du token (ton serveur l'envoie sous 'accessToken')
        const token = json.accessToken; 
        if (!token) {
          throw new Error("Token manquant dans la réponse du serveur");
        }

        // 3. Stockage du Token pour les appels API (Gestion élèves/profs)
        localStorage.setItem("token", token);

        // 4. Stockage du currentUser pour le Portail (index.html)
        // Comme le serveur ne renvoie pas l'objet user, on le crée ici
        localStorage.setItem("currentUser", JSON.stringify({
          username: username,
          role: "admin",
          isLoggedIn: true
        }));

        successDiv.textContent = "✅ Connexion réussie !";
        successDiv.style.display = "block";

        // Redirection vers le tableau de bord admin
        setTimeout(() => {
          window.location.href = "dashboard_admin.html";
        }, 800);

      } catch (err) {
        console.error("Erreur Login:", err);
        errorDiv.textContent = "❌ " + err.message;
        errorDiv.style.display = "block";
      } finally {
        submitButton.disabled = false;
      }
    });
  </script>

</body>
</html>
