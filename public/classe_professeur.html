<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Salle de classe</title>

<style>
body { font-family: Arial; background:#eef2f7; }
h1 { text-align:center; }
.list {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:1rem;
  padding:2rem;
}
.prof {
  background:#fff;
  border-radius:10px;
  padding:1rem;
  text-align:center;
  box-shadow:0 4px 8px rgba(0,0,0,.1);
}
.prof img {
  width:80px;
  height:80px;
  border-radius:50%;
  object-fit:cover;
}
button {
  margin-top:10px;
  padding:.6rem 1rem;
  border:none;
  background:#0066cc;
  color:#fff;
  border-radius:6px;
  cursor:pointer;
}
</style>
</head>

<body>

<h1>👨‍🏫 Professeurs disponibles</h1>

<div class="list" id="profList"></div>

<script>
const professeurs = [
  {
    id:1,
    nom:"Mme Dupont",
    photo:"https://i.pravatar.cc/150?img=47",
    pays:"France",
    ville:"Paris"
  },
  {
    id:2,
    nom:"Mr Ahmed",
    photo:"https://i.pravatar.cc/150?img=12",
    pays:"Maroc",
    ville:"Casablanca"
  },
  {
    id:3,
    nom:"Ms Smith",
    photo:"https://i.pravatar.cc/150?img=32",
    pays:"Canada",
    ville:"Montréal"
  }
];

const container = document.getElementById("profList");

professeurs.forEach(p=>{
  container.innerHTML += `
    <div class="prof">
      <img src="${p.photo}">
      <h3>${p.nom}</h3>
      <p>${p.ville}, ${p.pays}</p>
      <button onclick="connect(${p.id})">Entrer en salle</button>
    </div>
  `;
});

function connect(id){
  localStorage.setItem("profId", id);
  localStorage.setItem("startTime", Date.now());
  window.location.href = "classe_visio.html";
}
</script>

</body>
</html>
