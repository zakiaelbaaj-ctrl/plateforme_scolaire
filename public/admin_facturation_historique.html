<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin – Historique des Factures PDF</title>

  <!-- Dark mode premium -->
  <link rel="stylesheet" href="/css/admin_dark.css">
</head>

<body class="admin-page">

<!-- ============================
     HEADER
============================= -->
<header class="page-header">
  <div class="container">
    <h1>🧾 Historique des Factures PDF</h1>
    <p class="meta" id="invoiceCount">Chargement...</p>
  </div>
</header>

<!-- ============================
     CONTENU PRINCIPAL
============================= -->
<main class="container">

  <!-- Zone d’actions -->
  <section class="controls">
    <input 
      type="text" 
      id="searchInput" 
      placeholder="🔍 Rechercher une facture..."
      aria-label="Rechercher une facture"
    >
    <button class="validate-btn" onclick="loadFactures()">🔄 Rafraîchir</button>
  </section>

  <!-- Tableau -->
  <section class="table-wrapper" aria-label="Liste des factures PDF">
    <table class="table" id="factureTable">
      <thead>
        <tr>
          <th>#</th>
          <th>Élève</th>
          <th>Email</th>
          <th>Type</th>
          <th>Montant</th>
          <th>Date</th>
          <th>PDF</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <!-- Factures injectées ici -->
      </tbody>
    </table>
  </section>

  <!-- Retour -->
  <footer class="page-footer">
    <a href="dashboard_admin.html" class="back-home">⬅️ Retour à l'accueil</a>
  </footer>

</main>

<!-- ============================
     MODAL
============================= -->
<div id="confirmModal" class="modal" aria-hidden="true">
  <div class="modal-content">
    <h3 id="modalTitle">Confirmation</h3>
    <p id="modalMessage"></p>
    <div class="modal-buttons">
      <button class="btn-cancel" onclick="closeModal()">Annuler</button>
      <button class="btn-confirm" onclick="confirmAction()">Confirmer</button>
    </div>
  </div>
</div>

<!-- ============================
     SCRIPT
============================= -->
<script>
/* ============================================================
   VARIABLES GLOBALES
============================================================ */
let factures = [];
let filteredFactures = [];
let pendingAction = null;

/* ============================================================
   FETCH PRINCIPAL
============================================================ */
async function loadFactures() {
  try {
    const token = localStorage.getItem("token");
    if (!token) throw new Error("Token manquant — reconnecte-toi");

    const res = await fetch("http://localhost:4000/api/v1/admin/factures", {
      headers: { "Authorization": `Bearer ${token}` }
    });

    const json = await res.json();
    if (!res.ok || json.success !== true) throw new Error(json.message);

    factures = json.data.map(f => formatFacture(f));
    filteredFactures = [...factures];

    afficherFactures();

  } catch (err) {
    alert("❌ " + err.message);
  }
}

/* ============================================================
   FORMATAGE DES DONNÉES
============================================================ */
function formatFacture(f) {
  return {
    id: f.id,
    fullname: `${f.prenom || ""} ${f.nom || ""}`.trim(),
    email: f.email || "—",
    type: f.type || "—",
    montant: f.montant || 0,
    date: f.date ? new Date(f.date) : null,
    pdf_url: f.pdf_url || null
  };
}

/* ============================================================
   AFFICHAGE DU TABLEAU
============================================================ */
function afficherFactures() {
  const tbody = document.querySelector("#factureTable tbody");
  const count = document.getElementById("invoiceCount");

  tbody.innerHTML = "";
  count.textContent = `${filteredFactures.length} facture(s)`;

  if (filteredFactures.length === 0) {
    tbody.innerHTML = `<tr><td colspan="8" class="empty-state">Aucune facture trouvée.</td></tr>`;
    return;
  }

  filteredFactures.forEach((f, i) => {
    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${i + 1}</td>
      <td>${escapeHtml(f.fullname)}</td>
      <td>${escapeHtml(f.email)}</td>
      <td>${escapeHtml(f.type)}</td>
      <td>${f.montant.toFixed(2)} €</td>
      <td>${f.date ? f.date.toLocaleDateString() : "—"}</td>
      <td>
        ${f.pdf_url 
          ? `<a href="${f.pdf_url}" target="_blank" class="validate-btn">Télécharger</a>`
          : "—"
        }
      </td>
      <td class="actions">
        <button class="delete-btn" onclick="openDeleteModal(${i})">Supprimer</button>
      </td>
    `;

    tbody.appendChild(tr);
  });
}

/* ============================================================
   RECHERCHE
============================================================ */
document.getElementById("searchInput").addEventListener("input", (e) => {
  const q = e.target.value.toLowerCase();

  filteredFactures = factures.filter(f =>
    `${f.fullname} ${f.email} ${f.type}`.toLowerCase().includes(q)
  );

  afficherFactures();
});

/* ============================================================
   MODAL
============================================================ */
function openDeleteModal(i) {
  pendingAction = { type: "delete", index: i };
  showModal("Supprimer cette facture ?", "Cette action est irréversible.");
}

function showModal(title, message) {
  document.getElementById("modalTitle").textContent = title;
  document.getElementById("modalMessage").textContent = message;
  document.getElementById("confirmModal").setAttribute("aria-hidden", "false");
}

function closeModal() {
  pendingAction = null;
  document.getElementById("confirmModal").setAttribute("aria-hidden", "true");
}

/* ============================================================
   CONFIRMATION ACTION
============================================================ */
async function confirmAction() {
  if (!pendingAction) return;

  const { index } = pendingAction;
  const f = filteredFactures[index];
  const token = localStorage.getItem("token");

  try {
    await fetch(`http://localhost:4000/api/v1/admin/factures/${f.id}`, {
      method: "DELETE",
      headers: { "Authorization": `Bearer ${token}` }
    });

    factures = factures.filter(x => x.id !== f.id);
    filteredFactures = filteredFactures.filter(x => x.id !== f.id);

    afficherFactures();

  } catch (err) {
    alert("❌ Erreur lors de la suppression");
  }

  closeModal();
}

/* ============================================================
   UTILITAIRES
============================================================ */
function escapeHtml(text) {
  const div = document.createElement("div");
  div.textContent = text;
  return div.innerHTML;
}

/* ============================================================
   INIT
============================================================ */
loadFactures();
</script>

</body>
</html>
