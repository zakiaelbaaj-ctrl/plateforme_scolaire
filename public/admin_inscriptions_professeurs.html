<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin – Gestion des Professeurs</title>
  <link rel="stylesheet" href="/css/admin_dark.css">
</head>

<body class="admin-page">

<header class="page-header">
  <div class="container">
    <h1>👨‍🏫 Gestion des Professeurs</h1>
    <p class="meta" id="profCount">Chargement...</p>
  </div>
</header>

<main class="container">
  <section class="controls" aria-label="Actions de gestion">
    <div class="search-group">
        <input type="text" id="searchInput" placeholder="🔍 Rechercher un nom, email...">
        
        <select id="statusFilter" class="filter-select">
            <option value="all">Tous les statuts</option>
            <option value="pending">⏳ En attente</option>
            <option value="active">✔ Validés</option>
            <option value="rejected">⛔ Rejetés</option>
        </select>
    </div>
    <button class="validate-btn" onclick="chargerProfesseurs()">🔄 Rafraîchir</button>
  </section>

  <section class="table-wrapper">
    <table class="table" id="profTable">
      <thead>
        <tr>
          <th>#</th>
          <th>Nom / Prénom</th>
          <th>Email / Tel</th>
          <th>Diplôme</th>
          <th>Heures</th>
          <th>Inscription</th> 
          <th>Statut</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </section>

  <footer class="page-footer">
    <a href="dashboard_admin.html" class="back-home">⬅️ Retour à l'accueil</a>
  </footer>
</main>

<div id="confirmModal" class="modal" aria-hidden="true" role="dialog">
  <div class="modal-content">
    <h3 id="modalTitle">Confirmation</h3>
    <p id="modalMessage"></p>
    <div class="modal-buttons">
      <button class="btn-cancel" onclick="closeModal()">Annuler</button>
      <button class="btn-confirm" onclick="confirmAction()">Confirmer</button>
    </div>
  </div>
</div>

<script>
const API_URL = window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1"
  ? "http://localhost:4000" 
  : "https://plateforme-scolaire-1.onrender.com";

let professeurs = [];
let filteredProfs = [];
let pendingAction = null;

// ✅ SÉCURITÉ : Vérification immédiate du rôle
const currentUser = JSON.parse(localStorage.getItem("currentUser") || "{}");
if (currentUser.role !== 'admin') {
    window.location.replace("/login.html");
}

/* -----------------------------
   FETCH DES PROFESSEURS
----------------------------- */
async function chargerProfesseurs() {
  const tbody = document.querySelector("#profTable tbody");
  tbody.innerHTML = `<tr><td colspan="8" style="text-align:center; padding: 2rem;">⌛ Chargement des données...</td></tr>`;

  try {
    const token = localStorage.getItem("token");
    if (!token) {
        window.location.replace("/login.html");
        return;
    }

    const res = await fetch(`${API_URL}/api/v1/admin/users?role=prof`, {
      headers: { "Authorization": `Bearer ${token}` }
    });

    if (res.status === 401 || res.status === 403) {
        localStorage.clear();
        window.location.replace("/login.html");
        return;
    }

    const json = await res.json();
    if (!res.ok) throw new Error(json.message || "Erreur de chargement");

    // ✅ Récupération et Tri (plus récents en premier)
    professeurs = (json.data || json.users || []).sort((a, b) => b.id - a.id);
    appliquerFiltres();

  } catch (err) {
    tbody.innerHTML = `<tr><td colspan="8" style="color:red; text-align:center; padding: 2rem;">❌ ${err.message}</td></tr>`;
  }
}

/* -----------------------------
   AFFICHAGE TABLEAU
----------------------------- */
function afficherProfesseurs() {
  const tbody = document.querySelector("#profTable tbody");
  const count = document.getElementById("profCount");

  tbody.innerHTML = "";
  count.textContent = `${filteredProfs.length} professeur(s)`;

  if (filteredProfs.length === 0) {
    tbody.innerHTML = `<tr><td colspan="8" class="empty-state" style="text-align:center; padding: 2rem;">Aucun professeur trouvé.</td></tr>`;
    return;
  }

  filteredProfs.forEach((p, i) => {
    const statusClass = p.statut === "active" ? "validated" : p.statut === "pending" ? "pending" : "danger";
    const statusText = p.statut === "active" ? "✔ Validé" : p.statut === "pending" ? "⏳ En attente" : `⛔ ${p.statut}`;
    const dateInsc = p.created_at ? new Date(p.created_at).toLocaleDateString('fr-FR') : '—';
    // Sécurisation des chaînes
    const nomComplet = `<strong>${(p.nom || 'N/A').toUpperCase()}</strong><br>${p.prenom || ''}`;

    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${i + 1}</td>
      <td>${nomComplet}</td>
      <td><span style="font-size:12px;">${p.email}</span><br><small style="color:gray;">${p.telephone || '—'}</small></td>
      <td>${p.diplome_url ? `<a href="${p.diplome_url}" target="_blank" class="back-home" style="font-size:10px; padding:4px 6px;">📄 Voir</a>` : '<span style="color:gray; font-size:11px;">Aucun</span>'}</td>
      <td>${p.heures_mois || 0} h</td>
      <td><span style="font-size:11px;">${dateInsc}</span></td>
      <td><span class="status ${statusClass}">${statusText}</span></td>
      
     <td class="actions">
    ${p.statut !== 'active' ? `<button class="validate-btn" onclick="changerStatut(${i}, 'active')">Valider</button>` : ''}
    ${p.statut !== 'rejected' ? `<button class="delete-btn" onclick="changerStatut(${i}, 'rejected')" style="background:#dc2626">Rejeter</button>` : ''}
    <button class="btn-cancel" onclick="changerStatut(${i}, 'pending')" style="background:#4b5563">Attente</button>
    <button class="delete-btn" onclick="openDeleteModal(${i})" style="background:none; color:#ef4444; border:1px solid #ef4444;">🗑️</button>
    </td>
    `;
    tbody.appendChild(tr);
  });
}

/* -----------------------------
   FILTRES & RECHERCHE
----------------------------- */
function appliquerFiltres() {
  const q = document.getElementById("searchInput").value.toLowerCase();
  const status = document.getElementById("statusFilter").value;

  filteredProfs = professeurs.filter(p => {
    const nom = (p.nom || "").toLowerCase();
    const prenom = (p.prenom || "").toLowerCase();
    const email = (p.email || "").toLowerCase();
    const matchesQuery = nom.includes(q) || prenom.includes(q) || email.includes(q);
    const matchesStatus = status === "all" ? true : p.statut === status;
    return matchesQuery && matchesStatus;
  });
  afficherProfesseurs();
}

document.getElementById("searchInput").addEventListener("input", appliquerFiltres);
document.getElementById("statusFilter").addEventListener("change", appliquerFiltres);

/* -----------------------------
   CHANGEMENT STATUT (PATCH)
----------------------------- */
async function changerStatut(index, statut) {
  const prof = filteredProfs[index];
  const token = localStorage.getItem("token");

  try {
    const res = await fetch(`${API_URL}/api/v1/admin/users/${prof.id}`, {
      method: "PATCH",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${token}`
      },
      body: JSON.stringify({ statut, is_active: statut === 'active' })
    });

    if (!res.ok) throw new Error("Échec de la mise à jour");

    prof.statut = statut;
    appliquerFiltres(); // ✅ On ré-applique les filtres pour mettre à jour l'affichage
  } catch (err) {
    alert("❌ " + err.message);
  }
}

/* -----------------------------
   MODAL & SUPPRESSION
----------------------------- */
function openDeleteModal(index) {
  pendingAction = { index };
  const prof = filteredProfs[index];
  showModal("Supprimer ce professeur ?", `Voulez-vous vraiment supprimer le compte de ${prof.nom} ?`);
}

async function confirmAction() {
  if (!pendingAction) return;
  const prof = filteredProfs[pendingAction.index];
  const token = localStorage.getItem("token");

  try {
    const res = await fetch(`${API_URL}/api/v1/admin/users/${prof.id}`, {
      method: "DELETE",
      headers: { "Authorization": `Bearer ${token}` }
    });

    if (!res.ok) throw new Error("Échec de la suppression");

    professeurs = professeurs.filter(p => p.id !== prof.id);
    appliquerFiltres();
    closeModal();
  } catch (err) {
    alert("❌ " + err.message);
  }
}

function showModal(title, message) {
  document.getElementById("modalTitle").textContent = title;
  document.getElementById("modalMessage").textContent = message;
  document.getElementById("confirmModal").style.display = "flex";
}

function closeModal() {
  pendingAction = null;
  document.getElementById("confirmModal").style.display = "none";
}

window.onclick = function(event) {
  const modal = document.getElementById("confirmModal");
  if (event.target == modal) closeModal();
}

document.addEventListener("DOMContentLoaded", chargerProfesseurs);
</script>
</body>
</html>
