<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin – Gestion des Parents</title>

  <!-- Dark mode premium -->
  <link rel="stylesheet" href="/css/admin_dark.css">
</head>

<body class="admin-page">

<!-- ============================
     HEADER
============================= -->
<header class="page-header">
  <div class="container">
    <h1>👨‍👩‍👧 Gestion des Parents</h1>
    <p class="meta" id="parentCount">Chargement...</p>
  </div>
</header>

<!-- ============================
     CONTENU PRINCIPAL
============================= -->
<main class="container">

  <!-- Zone d’actions -->
  <section class="controls">
    <input 
      type="text" 
      id="searchInput" 
      placeholder="🔍 Rechercher un parent..."
      aria-label="Rechercher un parent"
    >
    <button class="validate-btn" onclick="chargerParents()">🔄 Rafraîchir</button>
  </section>

  <!-- Tableau -->
  <section class="table-wrapper" aria-label="Liste des parents">
    <table class="table" id="parentTable">
      <thead>
        <tr>
          <th>#</th>
          <th>Nom</th>
          <th>Prénom</th>
          <th>Email</th>
          <th>Téléphone</th>
          <th>Élèves associés</th>
          <th>Statut</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <!-- Parents injectés ici -->
      </tbody>
    </table>
  </section>

  <!-- Retour -->
  <footer class="page-footer">
    <a href="dashboard_admin.html" class="back-home">⬅️ Retour à l'accueil</a>
  </footer>

</main>

<!-- ============================
     MODAL
============================= -->
<div id="confirmModal" class="modal" aria-hidden="true" role="dialog" aria-modal="true">
  <div class="modal-content">
    <h3 id="modalTitle">Confirmation</h3>
    <p id="modalMessage"></p>
    <div class="modal-buttons">
      <button class="btn-cancel" onclick="closeModal()">Annuler</button>
      <button class="btn-confirm" onclick="confirmAction()">Confirmer</button>
    </div>
  </div>
</div>

<!-- ============================
     SCRIPT (inchangé)
============================= -->
<script>
let parents = [];
let filteredParents = [];
let pendingAction = null;

/* -----------------------------
   FETCH DES PARENTS
----------------------------- */
async function chargerParents() {
  try {
    const token = localStorage.getItem("token");
    if (!token) throw new Error("Token manquant — reconnecte-toi");

    const res = await fetch(`${API_URL}/api/v1/admin/users?role=parent`, {
      headers: { "Authorization": `Bearer ${token}` }
    });

    const json = await res.json();
    if (!res.ok || json.success !== true) throw new Error(json.message);

    parents = json.users.map(u => ({
      id: u.id,
      nom: u.nom || "—",
      prenom: u.prenom || "—",
      email: u.email || "—",
      telephone: u.telephone || "—",
      enfants: u.enfants || [],
      statut: u.statut || "en_attente"
    }));

    filteredParents = [...parents];
    afficherParents();

  } catch (err) {
    alert("❌ " + err.message);
  }
}

/* -----------------------------
   AFFICHAGE TABLEAU
----------------------------- */
function afficherParents() {
  const tbody = document.querySelector("#parentTable tbody");
  const count = document.getElementById("parentCount");

  tbody.innerHTML = "";
  count.textContent = `${filteredParents.length} parent(s)`;

  if (filteredParents.length === 0) {
    tbody.innerHTML = `<tr><td colspan="8" class="empty-state">Aucun parent trouvé.</td></tr>`;
    return;
  }

  filteredParents.forEach((p, i) => {
    const statusClass =
      p.statut === "valide" ? "validated" :
      p.statut === "en_attente" ? "pending" : "danger";

    const statusText =
      p.statut === "valide" ? "✔ Validé" :
      p.statut === "en_attente" ? "⏳ En attente" :
      `⛔ ${p.statut}`;

    const enfantsList = p.enfants.length > 0
      ? p.enfants.map(e => `${e.prenom} ${e.nom}`).join(", ")
      : "Aucun";

    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${i + 1}</td>
      <td>${p.nom}</td>
      <td>${p.prenom}</td>
      <td>${p.email}</td>
      <td>${p.telephone}</td>
      <td>${enfantsList}</td>
      <td><span class="status ${statusClass}">${statusText}</span></td>
      <td class="actions">
        <button class="validate-btn" onclick="changerStatut(${i}, 'valide')">Valider</button>
        <button class="btn-cancel" onclick="changerStatut(${i}, 'en_attente')">Attente</button>
        <button class="delete-btn" onclick="openDeleteModal(${i})">Supprimer</button>
      </td>
    `;
    tbody.appendChild(tr);
  });
}

/* -----------------------------
   RECHERCHE
----------------------------- */
document.getElementById("searchInput").addEventListener("input", (e) => {
  const q = e.target.value.toLowerCase();
  filteredParents = parents.filter(p =>
    `${p.nom} ${p.prenom} ${p.email}`.toLowerCase().includes(q)
  );
  afficherParents();
});

/* -----------------------------
   CHANGEMENT STATUT
----------------------------- */
async function changerStatut(index, statut) {
  const parent = filteredParents[index];
  const token = localStorage.getItem("token");

  try {
    await fetch(`${API_URL}/api/v1/admin/users/${parent.id}`, {
      method: "PATCH",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${token}`
      },
      body: JSON.stringify({ statut })
    });

    parent.statut = statut;
    afficherParents();

  } catch (err) {
    alert("❌ Erreur lors de la mise à jour du statut");
  }
}

/* -----------------------------
   SUPPRESSION
----------------------------- */
function openDeleteModal(index) {
  pendingAction = { type: "delete", index };
  showModal("Supprimer ce parent ?", "Cette action est irréversible.");
}

async function confirmAction() {
  if (!pendingAction) return;

  const { index } = pendingAction;
  const parent = filteredParents[index];
  const token = localStorage.getItem("token");

  try {
    await fetch(`${API_URL}/api/v1/admin/users/${parent.id}`, {
      method: "DELETE",
      headers: { "Authorization": `Bearer ${token}` }
    });

    parents = parents.filter(p => p.id !== parent.id);
    filteredParents = filteredParents.filter(p => p.id !== parent.id);

    afficherParents();
  } catch (err) {
    alert("❌ Erreur lors de la suppression");
  }

  closeModal();
}

/* -----------------------------
   MODAL
----------------------------- */
function showModal(title, message) {
  document.getElementById("modalTitle").textContent = title;
  document.getElementById("modalMessage").textContent = message;
  document.getElementById("confirmModal").setAttribute("aria-hidden", "false");
}

function closeModal() {
  pendingAction = null;
  document.getElementById("confirmModal").setAttribute("aria-hidden", "true");
}

/* -----------------------------
   INIT
----------------------------- */
chargerParents();
</script>

</body>
</html>
