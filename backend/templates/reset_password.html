<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Réinitialiser le mot de passe</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
            padding: 40px;
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 25px;
            font-size: 24px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
            font-size: 14px;
        }
        
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        button:hover:not(:disabled) {
            transform: translateY(-2px);
        }
        
        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
        
        .message {
            margin-top: 15px;
            padding: 12px;
            border-radius: 5px;
            text-align: center;
            font-size: 13px;
            display: none;
        }
        
        .error {
            background-color: #fee;
            color: #c33;
            border: 1px solid #fcc;
        }
        
        .success {
            background-color: #efe;
            color: #3c3;
            border: 1px solid #cfc;
        }
        
        .message.show {
            display: block;
        }
        
        .strength-bar {
            height: 4px;
            background: #ddd;
            border-radius: 2px;
            margin-top: 6px;
            overflow: hidden;
        }
        
        .strength-fill {
            height: 100%;
            width: 0%;
            transition: width 0.3s;
        }
        
        .strength-weak { background: #dc3545; }
        .strength-medium { background: #ffc107; }
        .strength-strong { background: #28a745; }
        
        .strength-text {
            font-size: 11px;
            margin-top: 4px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔑 Nouveau mot de passe</h1>
        
        <div id="loadingDiv" style="text-align: center; padding: 40px; color: #667eea;">
            ⏳ Vérification en cours...
        </div>
        
        <form id="resetForm" style="display: none;">
            <div class="form-group">
                <label for="password">Nouveau mot de passe</label>
                <input type="password" id="password" required placeholder="Minimum 8 caractères">
                <div class="strength-bar">
                    <div id="strengthFill" class="strength-fill"></div>
                </div>
                <div class="strength-text" id="strengthText"></div>
            </div>
            
            <div class="form-group">
                <label for="confirmPassword">Confirmer le mot de passe</label>
                <input type="password" id="confirmPassword" required placeholder="Confirmez votre mot de passe">
            </div>
            
            <button type="submit" id="submitBtn">Réinitialiser</button>
            
            <div id="messageDiv" class="message"></div>
        </form>
    </div>

    <script>
        // DOM Elements
        const loadingDiv = document.getElementById('loadingDiv');
        const form = document.getElementById('resetForm');
        const messageDiv = document.getElementById('messageDiv');
        const submitBtn = document.getElementById('submitBtn');
        const passwordInput = document.getElementById('password');
        const confirmInput = document.getElementById('confirmPassword');
        const strengthFill = document.getElementById('strengthFill');
        const strengthText = document.getElementById('strengthText');
        
        // State
        let token = null;
        let isLoading = false;
        let passwordStrength = 0;
        
        // Initialiser quand le DOM est chargé
        document.addEventListener('DOMContentLoaded', init);
        
        function init() {
            // Récupérer le token de l'URL
            const params = new URLSearchParams(window.location.search);
            token = params.get('token');
            
            if (!token) {
                showLoadingError('Lien invalide ou manquant');
                return;
            }
            
            verifyToken();
        }
        
        // Afficher une erreur dans la zone de chargement
        function showLoadingError(message) {
            loadingDiv.textContent = message;
            form.style.display = 'none';
        }
        
        // Vérifier le token
        async function verifyToken() {
            try {
                const response = await fetch(`/api/auth/verify-token/${encodeURIComponent(token)}`);
                
                if (!response.ok) {
                    showLoadingError('Lien expiré ou invalide. Demandez une nouvelle réinitialisation.');
                    return;
                }
                
                // Token valide, afficher le formulaire
                loadingDiv.style.display = 'none';
                form.style.display = 'block';
                
            } catch (err) {
                console.error('Erreur:', err);
                showLoadingError('Erreur de vérification. Veuillez réessayer.');
            }
        }
        
        // Calculer la force du mot de passe
        function calculatePasswordStrength(password) {
            let strength = 0;
            
            if (password.length >= 8) strength++;
            if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength++;
            if (/[0-9]/.test(password)) strength++;
            if (/[^a-zA-Z0-9]/.test(password)) strength++;
            
            return strength;
        }
        
        // Mettre à jour l'affichage de la force
        function updatePasswordStrengthDisplay(strength) {
            if (strength === 0) {
                strengthFill.className = 'strength-fill';
                strengthFill.style.width = '0%';
                strengthText.textContent = '';
            } else if (strength <= 1) {
                strengthFill.className = 'strength-fill strength-weak';
                strengthFill.style.width = '33%';
                strengthText.textContent = 'Faible';
                strengthText.style.color = '#dc3545';
            } else if (strength <= 2) {
                strengthFill.className = 'strength-fill strength-medium';
                strengthFill.style.width = '66%';
                strengthText.textContent = 'Moyen';
                strengthText.style.color = '#ffc107';
            } else {
                strengthFill.className = 'strength-fill strength-strong';
                strengthFill.style.width = '100%';
                strengthText.textContent = 'Fort';
                strengthText.style.color = '#28a745';
            }
        }
        
        // Événement : changement du mot de passe
        passwordInput.addEventListener('input', (e) => {
            passwordStrength = calculatePasswordStrength(e.target.value);
            updatePasswordStrengthDisplay(passwordStrength);
        });
        
        // Soumettre le formulaire
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            if (isLoading) return;
            
            // Réinitialiser le message
            messageDiv.classList.remove('show', 'error', 'success');
            messageDiv.textContent = '';
            
            const password = passwordInput.value.trim();
            const confirmPassword = confirmInput.value.trim();
            
            // Validation
            if (password.length < 8) {
                messageDiv.textContent = 'Le mot de passe doit contenir au moins 8 caractères';
                messageDiv.classList.add('show', 'error');
                return;
            }
            
            if (passwordStrength < 3) {
                messageDiv.textContent = 'Le mot de passe doit être plus fort (majuscules, chiffres, caractères spéciaux)';
                messageDiv.classList.add('show', 'error');
                return;
            }
            
            if (password !== confirmPassword) {
                messageDiv.textContent = 'Les mots de passe ne correspondent pas';
                messageDiv.classList.add('show', 'error');
                return;
            }
            
            // Envoyer la requête
            isLoading = true;
            submitBtn.disabled = true;
            const originalText = submitBtn.textContent;
            submitBtn.textContent = 'Réinitialisation...';
            
            try {
                const response = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, password })
                });
                
                if (!response.ok) {
                    const data = await response.json();
                    throw new Error(data.message || 'Erreur lors de la réinitialisation');
                }
                
                const data = await response.json();
                
                messageDiv.textContent = 'Mot de passe réinitialisé avec succès. Redirection...';
                messageDiv.classList.add('show', 'success');
                
                setTimeout(() => {
                    window.location.href = 'login_eleve.html';
                }, 2000);
                
            } catch (err) {
                console.error('Erreur:', err);
                messageDiv.textContent = err.message || 'Erreur lors de la réinitialisation';
                messageDiv.classList.add('show', 'error');
            } finally {
                isLoading = false;
                submitBtn.disabled = false;
                submitBtn.textContent = originalText;
            }
        });
    </script>
</body>
</html>
